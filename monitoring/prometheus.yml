global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "aitrader-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["aitrade-production-ecba.up.railway.app"]
    scheme: https
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "railway"